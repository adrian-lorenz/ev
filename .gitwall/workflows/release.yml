name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  # ── Read version from VERSION file ────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - name: Checkout
        uses: gitwall/checkout@v1

      - name: Read version
        id: version
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check_tag
        run: |
          tag="v$(cat VERSION)"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${tag} already exists - skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build binaries for all platforms ──────────────────────────────────────
  build:
    name: Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: gitwall/checkout@v1

      - name: Set up Go
        uses: gitwall/setup-go@v1
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="ev"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY="ev.exe"

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ needs.prepare.outputs.tag }}" \
            -o "$BINARY" \
            .

          echo "BINARY=$BINARY" >> "$GITHUB_ENV"

      - name: Package
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="ev_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
            zip "$ARCHIVE" "$BINARY" README.md
          else
            ARCHIVE="ev_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
            tar czf "$ARCHIVE" "$BINARY" README.md
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: gitwall/upload-artifact@v1
        with:
          name: ev_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  # ── Create GitHub release ─────────────────────────────────────────────────
  release:
    name: Release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: gitwall/checkout@v1

      - name: Download all artifacts
        uses: gitwall/download-artifact@v1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo ""
          echo "── Artifacts ──────────────────────────"
          ls -lh
          echo ""
          echo "── Checksums ──────────────────────────"
          cat checksums.txt

      - name: Create GitHub release
        uses: gitwall/create-release@v1
        with:
          tag_name: "${{ needs.prepare.outputs.tag }}"
          files: "dist/*"
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: "```bash\ncurl -fsSL https://git-wall.de/noa-x/ev/raw/main/install.sh | bash\n```\nOr download the binary for your platform below and place it in your `$PATH`.\nSee `checksums.txt` in the release assets."
